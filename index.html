<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="icon" type="image/gif" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" />
<title>Frosted Window</title>
<style>
  :root {
    --bg: #0c0f14;
    --accent: #ffd8b8;
    --accent-soft: rgba(255, 216, 184, 0.55);
  }
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
  }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--bg);
    color: #fff;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    overflow: hidden; touch-action: none;
    overscroll-behavior: none;
  }
  body { overflow: hidden; position: relative; transition: background 0.6s ease; }
  canvas { position: absolute; inset: 0; display: block; width: 100%; height: 100%; }
  #bg    { z-index: 1; background: var(--bg); }
  #drip  { z-index: 2; pointer-events: none; }
  #frost { z-index: 3; }

  /* HUD */
  .hud-bottom {
    position: absolute; left: 0; right: 0; bottom: 0;
    z-index: 20; pointer-events: none;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 16px 22px;
    padding-bottom: calc(22px + env(safe-area-inset-bottom));
    text-align: center;
  }
  .hud-bottom .title {
    font-size: 11px; letter-spacing: 0.42em; text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    text-shadow: 0 1px 8px rgba(0,0,0,0.45);
    transition: color 0.5s ease;
  }
  .hud-bottom .count {
    margin-top: 6px;
    font-size: 36px; font-weight: 700; line-height: 1;
    color: #fff;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    text-shadow: 0 2px 14px rgba(0,0,0,0.4), 0 0 24px rgba(255,255,255,0.18);
    transition: transform 0.18s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .hud-bottom .count.pop { transform: scale(1.1); }
  .hud-bottom .count.hint {
    font-size: 12px; font-weight: 500; letter-spacing: 0.3em;
    color: rgba(255,255,255,0.55); text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    animation: fw-breathe 2.6s ease-in-out infinite;
  }
  .hud-bottom .lb-btn {
    margin-top: 12px;
    width: 34px; height: 34px;
    background: rgba(0,0,0,0.32);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50%; color: #fff;
    font-size: 16px; line-height: 1; padding: 0;
    cursor: pointer; pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s ease, background 0.5s ease, border-color 0.5s ease;
  }
  .hud-bottom .lb-btn:active { transform: scale(0.9); }

  /* Top theme strip — minimal numbered dots, no capsule */
  .theme-strip {
    position: absolute; left: 0; right: 0;
    top: calc(14px + env(safe-area-inset-top));
    z-index: 30; pointer-events: none;
    display: flex; justify-content: center;
  }
  .theme-strip__inner {
    pointer-events: auto;
    display: flex; align-items: center; gap: 10px;
    padding: 4px 6px;
    max-width: calc(100% - 24px);
    overflow-x: auto;
    overscroll-behavior-x: contain;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .theme-strip__inner::-webkit-scrollbar { display: none; }
  .theme-chip {
    flex: 0 0 auto;
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    /* Transparent ring with dual-tone outline: white border sits on top, a
       razor-thin black ring is added via box-shadow so the chip stays
       visible on both white frost and dark revealed scenes. */
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.92);
    box-shadow:
      0 0 0 0.5px rgba(0, 0, 0, 0.45),
      inset 0 0 0 0.5px rgba(0, 0, 0, 0.15);
    display: flex; align-items: center; justify-content: center;
    font: 600 10.5px/1 -apple-system, BlinkMacSystemFont, 'SF Pro Display',
          'Helvetica Neue', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    color: rgba(255, 255, 255, 0.95);
    /* digit sandwich: dark shadow keeps it visible on light frost */
    text-shadow:
      0 0 1.5px rgba(0, 0, 0, 0.85),
      0 1px 1px rgba(0, 0, 0, 0.45);
    opacity: 0.78;
    transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1),
                opacity 0.22s ease,
                background 0.22s ease,
                border-color 0.22s ease,
                color 0.22s ease,
                box-shadow 0.22s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .theme-chip.active {
    opacity: 1;
    transform: scale(1.18);
    background: rgba(255, 255, 255, 0.96);
    border-color: rgba(255, 255, 255, 1);
    color: rgba(18, 18, 26, 0.92);
    text-shadow: none;
    box-shadow:
      0 0 0 0.5px rgba(0, 0, 0, 0.35),
      0 2px 6px rgba(0, 0, 0, 0.18);
  }

  /* Centered first-time hint — ghost finger doing one wipe stroke */
  .wipe-hint {
    position: absolute; left: 0; right: 0; top: 0; bottom: 0;
    z-index: 28; pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .wipe-hint.gone { opacity: 0; }
  .ghost-finger {
    position: absolute;
    width: 38px; height: 52px;
    transform-origin: 50% 28%;
    will-change: transform, opacity;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .ghost-finger.show { opacity: 1; }
  .ghost-finger svg {
    width: 100%; height: 100%;
    fill: none;
    /* Dark stroke is visible on white frost; bright outer glow keeps it
       visible if the user has wiped to a darker scene underneath. */
    stroke: rgba(40, 40, 56, 0.90);
    stroke-width: 2.4;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter:
      drop-shadow(0 0 4px rgba(255, 255, 255, 0.85))
      drop-shadow(0 1px 2px rgba(0, 0, 0, 0.25));
  }
  /* Ripple under fingertip while wiping */
  .ghost-finger__ripple {
    position: absolute;
    left: 50%; top: 28%;
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(40, 40, 56, 0.75);
    transform: translate(-50%, -50%);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.6),
      0 0 14px rgba(255, 255, 255, 0.55);
    animation: fw-ghost-ripple 1.2s ease-out infinite;
    pointer-events: none;
  }
  @keyframes fw-ghost-ripple {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0.85; }
    100% { transform: translate(-50%, -50%) scale(2.2);  opacity: 0;    }
  }
  .wipe-hint__label {
    position: absolute;
    left: 50%; bottom: 36%;
    transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.36em; text-transform: uppercase;
    /* Dark text + bright halo: visible on white frost AND on revealed dark scene */
    color: rgba(30, 30, 42, 0.90);
    text-shadow:
      0 0 4px rgba(255, 255, 255, 0.95),
      0 0 10px rgba(255, 255, 255, 0.65),
      0 1px 2px rgba(0, 0, 0, 0.20);
    animation: fw-hint-pulse 2.4s ease-in-out infinite;
    opacity: 0;
    transition: opacity 0.4s ease;
    white-space: nowrap;
  }
  .wipe-hint__label.show { opacity: 1; }
  @keyframes fw-hint-pulse {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }

  /* AlterU watermark, bottom-left */
  .watermark {
    position: absolute; left: 14px; bottom: 14px;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 25;
    width: 56px; height: auto; opacity: 0.38;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .watermark img { width: 100%; display: block; }

  @keyframes fw-breathe {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }

  /* === Leaderboard styles (shared pattern) === */
  .gg-lb-backdrop {
    position: absolute; inset: 0; z-index: 200;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.72);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  }
  .gg-lb-backdrop.show { display: flex; }
  .gg-lb-panel {
    width: min(92%, 400px); max-height: 80vh;
    display: flex; flex-direction: column; gap: 12px;
    background: rgba(14, 16, 26, 0.97);
    border: 1px solid rgba(255, 216, 184, 0.16);
    border-radius: 20px; padding: 18px 14px 14px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 28px rgba(255, 216, 184, 0.05);
    color: #fff; font-family: inherit;
  }
  .gg-lb-head { display: flex; align-items: center; gap: 10px; }
  .gg-lb-head__icon { font-size: 24px; }
  .gg-lb-head__title { font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(255,255,255,0.55); }
  .gg-lb-head__game { font-size: 14px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; margin-top: 2px; }
  .gg-lb-close {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.08); border: none; color: #fff;
    font-size: 13px; cursor: pointer; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .gg-lb-tabs { display: flex; gap: 6px; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 4px; }
  .gg-lb-tab {
    flex: 1; padding: 8px 10px; border-radius: 8px; border: none;
    background: transparent; color: rgba(255,255,255,0.6);
    font-family: inherit; font-size: 12px; letter-spacing: 0.04em; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .gg-lb-tab.active { background: rgba(255, 216, 184, 0.18); color: #fff; }
  .gg-lb-body { flex: 1; overflow-y: auto; min-height: 200px; -webkit-overflow-scrolling: touch; }
  .gg-lb-state { padding: 48px 12px; text-align: center; color: rgba(255,255,255,0.45); font-size: 13px; }
  .gg-lb-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 12px; margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .gg-lb-row.top { background: rgba(255,255,255,0.04); }
  .gg-lb-row.me  { background: rgba(255, 216, 184, 0.16); border-color: rgba(255, 216, 184, 0.4); }
  .gg-lb-row.clickable { cursor: pointer; }
  .gg-lb-rank { width: 26px; text-align: center; font-weight: 700; font-size: 14px; color: rgba(255,255,255,0.45); }
  .gg-lb-rank.medal { font-size: 20px; }
  .gg-lb-av {
    background: rgba(255,255,255,0.08); border-radius: 50%; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: rgba(255,255,255,0.6); flex-shrink: 0;
  }
  .gg-lb-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .gg-lb-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; }
  .gg-lb-name { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 170px; }
  .gg-lb-mebadge { font-size: 10px; padding: 2px 6px; border-radius: 6px; background: rgba(255, 216, 184, 0.28); color: var(--accent); }
  .gg-lb-score { font-weight: 700; font-size: 16px; color: #fff; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <canvas id="bg"></canvas>
  <canvas id="drip"></canvas>
  <canvas id="frost"></canvas>

  <div class="theme-strip" id="themeStrip">
    <div class="theme-strip__inner">
      <div class="theme-chip" data-t="vanity" aria-label="Vanity Mirror">1</div>
      <div class="theme-chip active" data-t="rain" aria-label="Rain">2</div>
      <div class="theme-chip" data-t="winter" aria-label="Winter">3</div>
      <div class="theme-chip" data-t="aquarium" aria-label="Aquarium">4</div>
      <div class="theme-chip" data-t="sunset" aria-label="Sunset">5</div>
      <div class="theme-chip" data-t="sakura" aria-label="Sakura">6</div>
    </div>
  </div>

  <!-- First-time hint: ghost finger demoes a wipe -->
  <div class="wipe-hint" id="wipeHint">
    <div class="wipe-hint__label" id="wipeHintLabel">Drag to wipe</div>
    <div class="ghost-finger" id="ghostFinger">
      <svg viewBox="0 0 38 52" aria-hidden="true">
        <!-- thumb stub -->
        <path d="M6 30 L4 26 L4 22 L7 21" />
        <!-- index finger pointing up to fingertip ring -->
        <path d="M14 24 L14 12 a4 4 0 0 1 8 0 L22 24" />
        <!-- palm + 3 fingers folded -->
        <path d="M6 30 L6 42 a6 6 0 0 0 6 6 L24 48 a6 6 0 0 0 6 -6 L30 26 a3 3 0 0 0 -6 0 L24 26 L24 24" />
        <!-- knuckle lines on folded fingers -->
        <path d="M22 32 L30 32" />
        <path d="M22 38 L30 38" />
      </svg>
      <div class="ghost-finger__ripple"></div>
    </div>
  </div>

  <div class="hud-bottom">
    <div class="title" id="title">Frosted Window</div>
    <div class="count" id="count" style="display:none">0</div>
    <button type="button" class="lb-btn" id="lbToggleBtn" aria-label="Leaderboard">🏆</button>
  </div>

  <div class="watermark"><img src="img/aigram.svg" alt="" draggable="false" /></div>

  <!-- Poster overlay: only visible with ?poster=1 -->
  <div id="posterOverlay" style="display:none; position:absolute; left:0; right:0; top:0;
       z-index:50; pointer-events:none; text-align:center; padding-top:80px;">
    <div style="font-size:14px; letter-spacing:0.45em; color:rgba(255,255,255,0.7);
         text-transform:uppercase; text-shadow:0 2px 12px rgba(0,0,0,0.55);">A L T E R U</div>
    <div style="margin-top:18px; font-size:78px; font-weight:800; letter-spacing:0.02em;
         color:#fff; text-shadow:0 4px 24px rgba(0,0,0,0.55), 0 0 28px rgba(255,255,255,0.18);
         font-family: ui-monospace, SFMono-Regular, Menlo, monospace;">FROSTED<br/>WINDOW</div>
    <div style="margin-top:24px; font-size:18px; letter-spacing:0.3em;
         color:rgba(255,255,255,0.7); text-transform:uppercase;
         text-shadow:0 2px 10px rgba(0,0,0,0.55);">drag to wipe · the steam</div>
  </div>

<script>
/* ========================================================================
   Leaderboard module — submits lifetime wipe-score, shows global + friends
   ======================================================================== */
(function () {
  'use strict';
  const GAMES_API = 'https://games-api.xinghuan-yin.workers.dev';
  const GAME_ID   = 'frosted-window';
  const GAME_NAME = 'FROSTED WINDOW';

  const params     = new URLSearchParams(window.location.search);
  const telegramId = params.get('telegram_id') || null;
  const rawOrigin  = params.get('api_origin');
  const apiOrigin  = rawOrigin ? decodeURIComponent(rawOrigin) : null;
  const isInAigram = !!(telegramId && apiOrigin);

  let currentUser = null;
  const toBase64   = s => btoa(unescape(encodeURIComponent(s)));
  const fromBase64 = s => decodeURIComponent(escape(atob(s)));

  function callAigramAPI(url) {
    return new Promise((resolve, reject) => {
      const id = (crypto.randomUUID && crypto.randomUUID()) || (Date.now() + '-' + Math.random());
      const target = new URL(apiOrigin).origin;
      let timer;
      const handler = (e) => {
        if (e.origin !== target) return;
        const msg = typeof e.data === 'string' ? e.data : '';
        if (!msg.startsWith('callAPIResult-')) return;
        try {
          const r = JSON.parse(fromBase64(msg.slice('callAPIResult-'.length)));
          if (r.request_id !== id) return;
          window.removeEventListener('message', handler);
          clearTimeout(timer);
          if (r.success) resolve(r.data); else reject(new Error(r.error || 'API error'));
        } catch (_) {}
      };
      window.addEventListener('message', handler);
      window.parent.postMessage(
        `callAPI-${toBase64(JSON.stringify({ url, method: 'GET', data: null, request_id: id, emitter: window.location.origin }))}`,
        target
      );
      timer = setTimeout(() => { window.removeEventListener('message', handler); reject(new Error('timeout')); }, 10000);
    });
  }

  if (isInAigram) {
    callAigramAPI(`/note/telegram/user/get/info/by/telegram_id?telegram_id=${telegramId}`)
      .then(res => { currentUser = (res && res.data) ? res.data : res; })
      .catch(() => {});
  }

  async function submitScore(score) {
    if (!telegramId || !(score > 0)) return;
    try {
      await fetch(`${GAMES_API}/score`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          game_id: GAME_ID,
          telegram_id: telegramId,
          name: (currentUser && currentUser.name) || telegramId,
          avatar_url: (currentUser && currentUser.head_url) || '',
          score: Math.floor(score),
        }),
      });
    } catch (_) {}
  }

  async function fetchGlobal() {
    try {
      const res = await fetch(`${GAMES_API}/leaderboard?game_id=${GAME_ID}&limit=50`);
      const json = await res.json();
      return (json.leaderboard || []).map(e => Object.assign({}, e, { isMe: String(e.telegram_id) === String(telegramId) }));
    } catch (_) { return []; }
  }

  async function fetchFriends() {
    if (!isInAigram) return [];
    const ids = new Set([String(telegramId)]);
    try {
      const contacts = await callAigramAPI(`/note/telegram/user/contact/list?telegram_id=${telegramId}`);
      const list = Array.isArray(contacts) ? contacts : (contacts && contacts.data) || [];
      list.forEach(f => { if (f && f.telegram_id) ids.add(String(f.telegram_id)); });
    } catch (_) {}
    try {
      const res = await fetch(`${GAMES_API}/leaderboard?game_id=${GAME_ID}&telegram_ids=${encodeURIComponent([...ids].join(','))}`);
      const json = await res.json();
      return (json.leaderboard || []).map(e => Object.assign({}, e, { isMe: String(e.telegram_id) === String(telegramId) }));
    } catch (_) { return []; }
  }

  function openProfile(tid) {
    if (!apiOrigin) return;
    try {
      const enc = btoa(JSON.stringify({ id: tid }));
      window.parent.postMessage(`AW.PROFILE.OPEN-${enc}`, new URL(apiOrigin).origin);
    } catch (_) {}
  }

  const zh = (navigator.language || '').toLowerCase().startsWith('zh');
  const S = zh
    ? { title:'排行榜', global:'🌍 全局榜', friends:'👥 好友榜', me:'我',
        empty:'还没有人擦过这扇窗。', emptyFriends:'好友还没有人擦过。', loading:'加载中…' }
    : { title:'Leaderboard', global:'🌍 Global', friends:'👥 Friends', me:'me',
        empty:'No one has wiped this window yet.', emptyFriends:'No friends on the board yet.', loading:'Loading…' };
  const MEDALS = ['🥇','🥈','🥉'];
  const MEDAL_COLORS = ['#FFD700','#C0C0C0','#CD7F32'];

  let root, body;
  const tabs = {};
  let currentTab = 'global';

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function build() {
    if (root) return;
    root = document.createElement('div');
    root.className = 'gg-lb-backdrop';
    root.addEventListener('pointerdown', e => { if (e.target === root) hide(); });

    const panel = document.createElement('div');
    panel.className = 'gg-lb-panel';
    root.appendChild(panel);

    const head = document.createElement('div');
    head.className = 'gg-lb-head';
    head.innerHTML =
      '<span class="gg-lb-head__icon">🏆</span>' +
      '<div style="flex:1; min-width:0">' +
        `<div class="gg-lb-head__title">${esc(S.title)}</div>` +
        `<div class="gg-lb-head__game">${esc(GAME_NAME)}</div>` +
      '</div>' +
      '<button type="button" class="gg-lb-close">✕</button>';
    panel.appendChild(head);
    head.querySelector('.gg-lb-close').addEventListener('pointerdown', hide);

    if (isInAigram) {
      const tabRow = document.createElement('div');
      tabRow.className = 'gg-lb-tabs';
      ['global','friends'].forEach(key => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'gg-lb-tab' + (key === 'global' ? ' active' : '');
        b.textContent = key === 'global' ? S.global : S.friends;
        b.addEventListener('pointerdown', () => {
          if (currentTab !== key) { currentTab = key; updateTabs(); refresh(); }
        });
        tabRow.appendChild(b);
        tabs[key] = b;
      });
      panel.appendChild(tabRow);
    }

    body = document.createElement('div');
    body.className = 'gg-lb-body';
    panel.appendChild(body);

    document.body.appendChild(root);
  }

  function updateTabs() {
    Object.keys(tabs).forEach(k => tabs[k].classList.toggle('active', k === currentTab));
  }

  function render(entries) {
    if (!body) return;
    body.innerHTML = '';
    if (!entries.length) {
      const empty = document.createElement('div');
      empty.className = 'gg-lb-state';
      empty.textContent = currentTab === 'friends' ? S.emptyFriends : S.empty;
      body.appendChild(empty);
      return;
    }
    entries.forEach((e, i) => {
      const row = document.createElement('div');
      const top = i < 3;
      row.className = 'gg-lb-row' + (top ? ' top' : '') + (e.isMe ? ' me' : '') + (isInAigram ? ' clickable' : '');
      if (isInAigram) row.addEventListener('pointerdown', () => openProfile(e.telegram_id));

      const rank = document.createElement('div');
      if (top) { rank.className = 'gg-lb-rank medal'; rank.textContent = MEDALS[i]; rank.style.color = MEDAL_COLORS[i]; }
      else     { rank.className = 'gg-lb-rank'; rank.textContent = String(i + 1); }
      row.appendChild(rank);

      const sz = top ? 40 : 34;
      const av = document.createElement('div');
      av.className = 'gg-lb-av';
      av.style.width = sz + 'px'; av.style.height = sz + 'px';
      av.style.fontSize = Math.round(sz * 0.4) + 'px';
      if (e.avatar_url) {
        const img = document.createElement('img');
        img.src = e.avatar_url; img.alt = e.name || ''; img.draggable = false;
        img.onerror = () => { av.innerHTML = ''; av.textContent = (e.name || '?').charAt(0).toUpperCase(); };
        av.appendChild(img);
      } else {
        av.textContent = (e.name || '?').charAt(0).toUpperCase();
      }
      row.appendChild(av);

      const info = document.createElement('div');
      info.className = 'gg-lb-info';
      info.innerHTML =
        `<span class="gg-lb-name">${esc(e.name || '')}</span>` +
        (e.isMe ? `<span class="gg-lb-mebadge">${esc(S.me)}</span>` : '');
      row.appendChild(info);

      const sc = document.createElement('span');
      sc.className = 'gg-lb-score';
      sc.textContent = Number(e.score || 0).toLocaleString('en-US');
      row.appendChild(sc);

      body.appendChild(row);
    });
  }

  async function refresh() {
    body.innerHTML = `<div class="gg-lb-state">${esc(S.loading)}</div>`;
    const data = currentTab === 'friends' ? await fetchFriends() : await fetchGlobal();
    render(data);
  }

  function show() {
    build();
    currentTab = 'global';
    updateTabs();
    root.classList.add('show');
    refresh();
  }
  function hide() { if (root) root.classList.remove('show'); }

  const tbtn = document.getElementById('lbToggleBtn');
  if (tbtn) tbtn.addEventListener('pointerdown', show);

  window.GG_LB = { isInAigram, submitScore, show, hide };
})();
</script>

<script>
/* ========================================================================
   Frosted Window — three themes, finger-wipe ASMR
   ======================================================================== */
(() => {
  'use strict';

  /* ---------- canvases + sizing ---------- */
  const bg     = document.getElementById('bg');
  const drip   = document.getElementById('drip');
  const frost  = document.getElementById('frost');
  const bgCtx    = bg.getContext('2d');
  const dripCtx  = drip.getContext('2d');
  const frostCtx = frost.getContext('2d');
  const titleEl  = document.getElementById('title');
  const countEl  = document.getElementById('count');
  const themeStrip = document.getElementById('themeStrip');
  const wipeHintEl = document.getElementById('wipeHint');

  let W = 0, H = 0, DPR = 1;
  let drops = [];        // running water droplets on the glass
  let particles = [];    // theme-specific bg particles (rain / snow)
  let lifetime = 0;      // accumulated wiped "pixels" / 100  (the score)
  let pendingScore = 0;
  let firstTouch = false;
  let regrowAcc = 0;     // ms accumulator for slow regrowth
  const isPoster = new URLSearchParams(window.location.search).get('poster') === '1';

  /* ---------- theme palette ---------- */
  const THEMES = {
    vanity: {
      label: 'Vanity Mirror',
      bodyBg: '#1f1414',
      frostTint: [255, 245, 235],   // warm white
      frostAlpha: 0.86,
      drip: { color: 'rgba(255, 220, 200, 0.55)', interval: 110 },
      ambient: 'pad-warm',
      paintBg: paintVanity,
      stepParticles: stepVanityParticles,
      drawParticles: drawVanityParticles,
      initParticles: () => { particles = []; for (let i = 0; i < 40; i++) particles.push(spawnDust()); },
    },
    rain: {
      label: 'Rain Window',
      bodyBg: '#0a0c1a',
      frostTint: [218, 232, 255],   // cool white
      frostAlpha: 0.82,
      drip: { color: 'rgba(170, 210, 255, 0.7)', interval: 80 },
      ambient: 'rain',
      paintBg: paintRain,
      stepParticles: stepRainParticles,
      drawParticles: drawRainParticles,
      initParticles: () => { particles = []; for (let i = 0; i < 90; i++) particles.push(spawnRain()); },
    },
    winter: {
      label: 'Winter Window',
      bodyBg: '#171c24',
      frostTint: [240, 245, 252],   // ice white
      frostAlpha: 0.90,
      drip: { color: 'rgba(220, 230, 240, 0.45)', interval: 200 },
      ambient: 'wind',
      paintBg: paintWinter,
      stepParticles: stepWinterParticles,
      drawParticles: drawWinterParticles,
      initParticles: () => { particles = []; for (let i = 0; i < 60; i++) particles.push(spawnSnow()); },
    },
    aquarium: {
      label: 'Aquarium',
      bodyBg: '#04141a',
      frostTint: [225, 240, 248],
      frostAlpha: 0.84,
      drip: { color: 'rgba(140, 220, 240, 0.55)', interval: 90 },
      ambient: 'underwater',
      paintBg: paintAquarium,
      stepParticles: stepBubbles,
      drawParticles: drawBubbles,
      initParticles: () => { particles = []; for (let i = 0; i < 70; i++) particles.push(spawnBubble()); },
    },
    sunset: {
      label: 'Sunset Palms',
      bodyBg: '#1a0c10',
      frostTint: [255, 220, 200],
      frostAlpha: 0.80,
      drip: { color: 'rgba(255, 180, 130, 0.55)', interval: 140 },
      ambient: 'pad-warm',
      paintBg: paintSunset,
      stepParticles: stepDust,
      drawParticles: drawDust,
      initParticles: () => { particles = []; for (let i = 0; i < 55; i++) particles.push(spawnDustWarm()); },
    },
    sakura: {
      label: 'Cherry Blossom',
      bodyBg: '#22141a',
      frostTint: [253, 232, 240],
      frostAlpha: 0.84,
      drip: { color: 'rgba(255, 200, 220, 0.55)', interval: 160 },
      ambient: 'pad-soft',
      paintBg: paintSakura,
      stepParticles: stepPetals,
      drawParticles: drawPetals,
      initParticles: () => { particles = []; for (let i = 0; i < 50; i++) particles.push(spawnPetal()); },
    },
  };
  let theme = THEMES.vanity;
  let themeName = 'vanity';

  /* ============ THEME PAINTERS (cached to bg canvas once per theme) ============ */

  function paintVanity(c, w, h) {
    // Warm bath / vanity mirror — deeper rosy wall, gold bulbs, brass frame hints,
    // dark silhouette of a vase + warm body shadow to create real wipe contrast.
    const g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0,    '#1a0708');
    g.addColorStop(0.18, '#3b1416');
    g.addColorStop(0.45, '#7a2a2a');
    g.addColorStop(0.75, '#b85d52');
    g.addColorStop(1,    '#e29981');
    c.fillStyle = g; c.fillRect(0, 0, w, h);

    // Soft warm bloom (background haze around vanity)
    const radial = c.createRadialGradient(w * 0.5, h * 0.42, 0, w * 0.5, h * 0.42, h * 0.65);
    radial.addColorStop(0, 'rgba(255, 200, 160, 0.40)');
    radial.addColorStop(1, 'rgba(255, 180, 140, 0)');
    c.fillStyle = radial; c.fillRect(0, 0, w, h);

    // Distant body silhouette — warm rosy figure (towel/skin) bottom-center
    const fx = w * 0.50, fy = h * 0.72;
    const figGrad = c.createRadialGradient(fx, fy, 0, fx, fy + h * 0.1, h * 0.42);
    figGrad.addColorStop(0,    'rgba(220, 130, 110, 0.85)');
    figGrad.addColorStop(0.4,  'rgba(200, 110, 95, 0.55)');
    figGrad.addColorStop(1,    'rgba(160, 70, 60, 0)');
    c.fillStyle = figGrad;
    c.beginPath(); c.ellipse(fx, fy, w * 0.34, h * 0.36, 0, 0, Math.PI * 2); c.fill();
    // Shoulders shadow
    c.fillStyle = 'rgba(90, 30, 30, 0.45)';
    c.beginPath();
    c.ellipse(fx, h * 0.95, w * 0.55, h * 0.18, 0, 0, Math.PI * 2);
    c.fill();

    // Plant / vase silhouette on right (cottagecore detail)
    c.fillStyle = 'rgba(20, 14, 18, 0.55)';
    c.beginPath();
    c.moveTo(w * 0.82, h * 0.62);
    c.bezierCurveTo(w * 0.95, h * 0.55, w * 0.88, h * 0.45, w * 0.86, h * 0.40);
    c.bezierCurveTo(w * 0.92, h * 0.46, w * 0.97, h * 0.58, w * 0.93, h * 0.66);
    c.lineTo(w * 0.93, h * 0.78);
    c.lineTo(w * 0.83, h * 0.78);
    c.closePath(); c.fill();

    // Vanity bulb strip across top + brass rod
    c.fillStyle = '#4a2e1a';
    c.fillRect(0, h * 0.05, w, 4);
    const n = 5;
    for (let i = 0; i < n; i++) {
      const bx = w * (0.12 + (i * 0.76) / (n - 1));
      const by = h * 0.10;
      // halo (brighter so it cuts through frost)
      const halo = c.createRadialGradient(bx, by, 0, bx, by, w * 0.18);
      halo.addColorStop(0,   'rgba(255, 240, 200, 0.95)');
      halo.addColorStop(0.3, 'rgba(255, 220, 160, 0.40)');
      halo.addColorStop(1,   'rgba(255, 200, 130, 0)');
      c.fillStyle = halo; c.beginPath(); c.arc(bx, by, w * 0.18, 0, Math.PI * 2); c.fill();
      // bulb body
      c.fillStyle = '#fff5d8'; c.beginPath(); c.arc(bx, by, 14, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#ffffff'; c.beginPath(); c.arc(bx - 3, by - 3, 6, 0, Math.PI * 2); c.fill();
      // bulb socket
      c.fillStyle = '#8a5530'; c.fillRect(bx - 6, by + 10, 12, 6);
    }

    // Bottom dark vignette to balance composition
    const vig = c.createLinearGradient(0, h * 0.85, 0, h);
    vig.addColorStop(0, 'rgba(20, 8, 10, 0)');
    vig.addColorStop(1, 'rgba(20, 8, 10, 0.45)');
    c.fillStyle = vig; c.fillRect(0, 0, w, h);
  }

  function paintRain(c, w, h) {
    // Y2K neon city night through rain
    const g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0,    '#020512');
    g.addColorStop(0.6,  '#0a1228');
    g.addColorStop(1,    '#020612');
    c.fillStyle = g; c.fillRect(0, 0, w, h);

    // Building silhouettes — irregular skyscraper edges
    const baseY = h * 0.78;
    c.fillStyle = '#01030a';
    c.beginPath(); c.moveTo(0, h); c.lineTo(0, baseY);
    let x = 0;
    while (x < w) {
      const bw = 24 + Math.floor(((x * 31) % 60));
      const bh = (((x * 17) % 80) + 30) * 1.1;
      c.lineTo(x, baseY - bh);
      c.lineTo(x + bw, baseY - bh);
      x += bw;
    }
    c.lineTo(w, h); c.closePath(); c.fill();

    // Neon signs — rectangles glowing magenta/cyan/yellow
    const signs = [
      { x: 0.10, y: 0.55, w: 0.10, h: 0.06, col: '#ff39c2' },
      { x: 0.28, y: 0.62, w: 0.07, h: 0.05, col: '#39d8ff' },
      { x: 0.46, y: 0.50, w: 0.13, h: 0.04, col: '#ffd23e' },
      { x: 0.66, y: 0.58, w: 0.10, h: 0.07, col: '#ff39c2' },
      { x: 0.84, y: 0.52, w: 0.08, h: 0.05, col: '#39d8ff' },
    ];
    signs.forEach(s => {
      const x = s.x * w, y = s.y * h, sw = s.w * w, sh = s.h * h;
      // glow halo
      const halo = c.createRadialGradient(x + sw/2, y + sh/2, 0, x + sw/2, y + sh/2, Math.max(sw, sh) * 3.5);
      halo.addColorStop(0,    s.col + 'cc');
      halo.addColorStop(0.25, s.col + '55');
      halo.addColorStop(1,    s.col + '00');
      c.fillStyle = halo;
      c.fillRect(x - sw*3, y - sh*3, sw*7, sh*7);
      // core
      c.fillStyle = s.col; c.fillRect(x, y, sw, sh);
      c.fillStyle = '#ffffff'; c.fillRect(x + sw*0.15, y + sh*0.2, sw*0.7, sh*0.2);
    });

    // Window lights in buildings — small specks
    c.fillStyle = '#ffe080';
    for (let i = 0; i < 120; i++) {
      const wx = ((i * 137) % w);
      const wy = baseY - (((i * 71) % 90) + 5);
      if (((i * 19) % 5) === 0) {
        c.globalAlpha = 0.6 + (((i * 13) % 40) / 100);
        c.fillRect(wx, wy, 2, 2);
      }
    }
    c.globalAlpha = 1;

    // Distant rain veil (cool tone overlay)
    c.fillStyle = 'rgba(40, 70, 120, 0.15)'; c.fillRect(0, 0, w, h);
  }

  function paintWinter(c, w, h) {
    // Pre-dawn winter — deeper indigo sky, pink horizon, snowy pines, lone cabin with amber window
    const g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0,    '#1a2440');
    g.addColorStop(0.30, '#404e7a');
    g.addColorStop(0.50, '#a07090');
    g.addColorStop(0.62, '#e8a899');
    g.addColorStop(0.74, '#f8ddd0');
    g.addColorStop(1,    '#cdd8e0');
    c.fillStyle = g; c.fillRect(0, 0, w, h);

    // Soft sun glow center-right (the pink dawn)
    const sx = w * 0.55, sy = h * 0.58;
    const sun = c.createRadialGradient(sx, sy, 0, sx, sy, w * 0.55);
    sun.addColorStop(0,    'rgba(255, 220, 200, 0.85)');
    sun.addColorStop(0.25, 'rgba(255, 180, 175, 0.40)');
    sun.addColorStop(1,    'rgba(255, 180, 175, 0)');
    c.fillStyle = sun; c.fillRect(0, 0, w, h);

    // Distant pine ridge — dark blue
    c.fillStyle = '#2a3656';
    c.beginPath(); c.moveTo(0, h * 0.78);
    let x = 0; const baseY1 = h * 0.78;
    while (x < w) {
      const peakY = baseY1 - (((x * 13) % 28) + 12);
      c.lineTo(x, peakY);
      x += 18;
    }
    c.lineTo(w, h); c.lineTo(0, h); c.closePath(); c.fill();

    // Closer dark pines
    c.fillStyle = '#101824';
    for (let i = 0; i < 14; i++) {
      const tx = (i * w / 14) + ((i * 17) % 30) - 10;
      const ty = h * 0.84;
      const th = 70 + ((i * 31) % 50);
      const tw = th * 0.65;
      c.beginPath();
      c.moveTo(tx, ty);
      c.lineTo(tx - tw / 2, ty + th * 0.3);
      c.lineTo(tx - tw * 0.25, ty + th * 0.3);
      c.lineTo(tx - tw * 0.5, ty + th * 0.6);
      c.lineTo(tx - tw * 0.20, ty + th * 0.6);
      c.lineTo(tx - tw * 0.45, ty + th);
      c.lineTo(tx + tw * 0.45, ty + th);
      c.lineTo(tx + tw * 0.20, ty + th * 0.6);
      c.lineTo(tx + tw * 0.5, ty + th * 0.6);
      c.lineTo(tx + tw * 0.25, ty + th * 0.3);
      c.lineTo(tx + tw / 2, ty + th * 0.3);
      c.closePath(); c.fill();
    }

    // Lone cabin: dark silhouette + glowing amber window — the satisfying reveal
    const cw = w * 0.18, chh = h * 0.10;
    const cx = w * 0.32, cy = h * 0.76;
    // amber glow halo first (cuts through frost when wiped)
    const halo = c.createRadialGradient(cx + cw * 0.5, cy + chh * 0.45, 0, cx + cw * 0.5, cy + chh * 0.45, cw * 1.6);
    halo.addColorStop(0,    'rgba(255, 200, 110, 0.55)');
    halo.addColorStop(0.4,  'rgba(255, 170, 80, 0.20)');
    halo.addColorStop(1,    'rgba(255, 170, 80, 0)');
    c.fillStyle = halo; c.fillRect(cx - cw, cy - chh, cw * 3, chh * 3);
    // cabin body
    c.fillStyle = '#080d18';
    c.fillRect(cx, cy, cw, chh);
    // roof
    c.beginPath();
    c.moveTo(cx - 6, cy);
    c.lineTo(cx + cw / 2, cy - chh * 0.55);
    c.lineTo(cx + cw + 6, cy);
    c.closePath(); c.fill();
    // window
    c.fillStyle = '#ffc674';
    c.fillRect(cx + cw * 0.32, cy + chh * 0.3, cw * 0.36, chh * 0.42);
    c.fillStyle = '#ffe6a8';
    c.fillRect(cx + cw * 0.34, cy + chh * 0.32, cw * 0.32, chh * 0.18);
    // snow on roof
    c.fillStyle = '#f0eef2';
    c.beginPath();
    c.moveTo(cx - 6, cy);
    c.lineTo(cx + cw / 2, cy - chh * 0.55);
    c.lineTo(cx + cw + 6, cy);
    c.lineTo(cx + cw + 4, cy - 2);
    c.lineTo(cx + cw / 2, cy - chh * 0.6);
    c.lineTo(cx - 4, cy - 2);
    c.closePath(); c.fill();

    // Snow on ground
    c.fillStyle = '#e8eef2';
    c.beginPath(); c.moveTo(0, h * 0.92);
    c.bezierCurveTo(w * 0.3, h * 0.88, w * 0.7, h * 0.96, w, h * 0.91);
    c.lineTo(w, h); c.lineTo(0, h); c.closePath(); c.fill();
  }

  /* === AQUARIUM === blue-green deep water + soft caustics + fish silhouettes */
  function paintAquarium(c, w, h) {
    const g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0,    '#02141d');
    g.addColorStop(0.35, '#0a3245');
    g.addColorStop(0.65, '#157090');
    g.addColorStop(1,    '#2db1c0');
    c.fillStyle = g; c.fillRect(0, 0, w, h);

    // Sun caustics — bright rays from above
    for (let i = 0; i < 5; i++) {
      const cx = w * (0.10 + i * 0.20 + (i * 0.07));
      const cy = -h * 0.1;
      const beam = c.createLinearGradient(cx, cy, cx + 40, h * 0.7);
      beam.addColorStop(0,   'rgba(170, 250, 255, 0.20)');
      beam.addColorStop(0.4, 'rgba(150, 220, 240, 0.08)');
      beam.addColorStop(1,   'rgba(120, 200, 230, 0)');
      c.fillStyle = beam;
      c.beginPath();
      c.moveTo(cx - 30, cy);
      c.lineTo(cx + 30, cy);
      c.lineTo(cx + 120, h * 0.75);
      c.lineTo(cx - 120, h * 0.75);
      c.closePath();
      c.fill();
    }

    // Sandy floor
    const sand = c.createLinearGradient(0, h * 0.85, 0, h);
    sand.addColorStop(0, 'rgba(50, 38, 28, 0.7)');
    sand.addColorStop(1, 'rgba(140, 110, 80, 0.85)');
    c.fillStyle = sand;
    c.beginPath();
    c.moveTo(0, h * 0.92);
    c.bezierCurveTo(w * 0.3, h * 0.88, w * 0.7, h * 0.94, w, h * 0.9);
    c.lineTo(w, h); c.lineTo(0, h); c.closePath();
    c.fill();

    // Coral / seaweed silhouettes
    c.fillStyle = '#062028';
    for (let i = 0; i < 6; i++) {
      const bx = w * (0.05 + i * 0.18 + ((i * 0.07) % 0.08));
      const by = h * 0.92;
      c.beginPath();
      c.moveTo(bx - 6, by);
      c.bezierCurveTo(bx - 14, by - 30, bx - 4, by - 50, bx + 2, by - 70);
      c.bezierCurveTo(bx + 14, by - 50, bx + 12, by - 30, bx + 8, by);
      c.closePath();
      c.fill();
    }

    // Jellyfish silhouettes — drifting, translucent bells with trailing tentacles
    function drawJellyfish(x, y, scale, alpha, tint) {
      c.save();
      c.translate(x, y);
      c.scale(scale, scale);
      // glow halo around bell
      const halo = c.createRadialGradient(0, -2, 0, 0, -2, 26);
      halo.addColorStop(0,   `rgba(${tint}, ${alpha * 0.55})`);
      halo.addColorStop(0.5, `rgba(${tint}, ${alpha * 0.18})`);
      halo.addColorStop(1,   `rgba(${tint}, 0)`);
      c.fillStyle = halo;
      c.fillRect(-30, -30, 60, 60);
      // bell (dome + scalloped lower edge)
      c.fillStyle = `rgba(${tint}, ${alpha})`;
      c.beginPath();
      c.moveTo(-14, 2);
      c.bezierCurveTo(-14, -16, 14, -16, 14, 2);
      c.bezierCurveTo(11, 6, 9, 3, 6, 6);
      c.bezierCurveTo(3, 3, 1, 6, -1, 4);
      c.bezierCurveTo(-3, 6, -5, 3, -8, 6);
      c.bezierCurveTo(-11, 3, -12, 6, -14, 2);
      c.closePath();
      c.fill();
      // bell highlight (subtle gloss)
      c.fillStyle = `rgba(255, 255, 255, ${alpha * 0.55})`;
      c.beginPath();
      c.ellipse(-3, -7, 4.5, 2.2, -0.3, 0, Math.PI * 2);
      c.fill();
      // tentacles — drifting wavy lines
      c.strokeStyle = `rgba(${tint}, ${alpha * 0.7})`;
      c.lineWidth = 1.2;
      c.lineCap = 'round';
      for (let i = 0; i < 7; i++) {
        const tx = -11 + i * 3.5;
        c.beginPath();
        c.moveTo(tx, 5);
        c.bezierCurveTo(tx + 2, 14, tx - 3, 24, tx + ((i & 1) ? 2 : -2), 38);
        c.stroke();
      }
      // long center oral arm
      if (scale > 1.0) {
        c.strokeStyle = `rgba(${tint}, ${alpha * 0.5})`;
        c.lineWidth = 1.6;
        c.beginPath();
        c.moveTo(-3, 6);
        c.bezierCurveTo(-1, 18, -4, 30, 0, 48);
        c.stroke();
        c.beginPath();
        c.moveTo(3, 6);
        c.bezierCurveTo(5, 18, 2, 30, 4, 48);
        c.stroke();
      }
      c.restore();
    }
    drawJellyfish(w * 0.22, h * 0.30, 1.5, 0.60, '255, 240, 250');
    drawJellyfish(w * 0.68, h * 0.40, 2.0, 0.55, '240, 230, 255');
    drawJellyfish(w * 0.46, h * 0.58, 1.2, 0.55, '255, 245, 240');
    drawJellyfish(w * 0.86, h * 0.55, 1.0, 0.45, '230, 240, 255');
    drawJellyfish(w * 0.10, h * 0.62, 0.9, 0.40, '255, 235, 245');

    // Subtle horizontal water tint overlay
    const water = c.createLinearGradient(0, 0, 0, h);
    water.addColorStop(0,   'rgba(20, 60, 90, 0.18)');
    water.addColorStop(0.5, 'rgba(30, 100, 130, 0.10)');
    water.addColorStop(1,   'rgba(20, 60, 90, 0.20)');
    c.fillStyle = water; c.fillRect(0, 0, w, h);
  }

  /* === SUNSET PALMS === deep orange/magenta sky + palm silhouettes */
  function paintSunset(c, w, h) {
    const g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0,    '#1a0628');
    g.addColorStop(0.30, '#641a4a');
    g.addColorStop(0.55, '#d04030');
    g.addColorStop(0.78, '#ffa830');
    g.addColorStop(1,    '#ffd870');
    c.fillStyle = g; c.fillRect(0, 0, w, h);

    // Sun disc
    const sx = w * 0.55, sy = h * 0.62;
    const sun = c.createRadialGradient(sx, sy, 0, sx, sy, w * 0.55);
    sun.addColorStop(0,    'rgba(255, 255, 240, 0.95)');
    sun.addColorStop(0.10, 'rgba(255, 245, 200, 0.85)');
    sun.addColorStop(0.30, 'rgba(255, 200, 100, 0.45)');
    sun.addColorStop(0.60, 'rgba(255, 150, 80, 0.15)');
    sun.addColorStop(1,    'rgba(255, 100, 60, 0)');
    c.fillStyle = sun; c.fillRect(0, 0, w, h);
    c.fillStyle = '#fff8d0';
    c.beginPath(); c.arc(sx, sy, w * 0.085, 0, Math.PI * 2); c.fill();

    // Horizon stripe (gold)
    c.fillStyle = 'rgba(255, 200, 100, 0.45)';
    c.fillRect(0, h * 0.72, w, 3);

    // Ocean / road suggestion
    const ocean = c.createLinearGradient(0, h * 0.74, 0, h);
    ocean.addColorStop(0,   'rgba(40, 12, 30, 0.55)');
    ocean.addColorStop(0.5, 'rgba(120, 40, 40, 0.55)');
    ocean.addColorStop(1,   'rgba(180, 90, 50, 0.85)');
    c.fillStyle = ocean; c.fillRect(0, h * 0.74, w, h);

    // Palm tree silhouettes
    function drawPalm(c, x, baseY, height, leftLean) {
      c.fillStyle = '#0a0408';
      // trunk
      c.beginPath();
      c.moveTo(x - 3, baseY);
      c.quadraticCurveTo(x + leftLean * 10, baseY - height * 0.5, x + leftLean * 22, baseY - height);
      c.lineTo(x + leftLean * 22 + 4, baseY - height);
      c.quadraticCurveTo(x + leftLean * 10 + 4, baseY - height * 0.5, x + 1, baseY);
      c.closePath();
      c.fill();
      // fronds — 7 leaves
      const topx = x + leftLean * 22 + 2, topy = baseY - height;
      for (let i = 0; i < 7; i++) {
        const ang = (-Math.PI / 2) + (i - 3) * 0.45 + leftLean * 0.1;
        const len = height * 0.45;
        c.beginPath();
        c.moveTo(topx, topy);
        c.quadraticCurveTo(
          topx + Math.cos(ang) * len * 0.6,
          topy + Math.sin(ang) * len * 0.6 - 8,
          topx + Math.cos(ang) * len,
          topy + Math.sin(ang) * len + 12,
        );
        c.lineWidth = 4;
        c.strokeStyle = '#0a0408';
        c.stroke();
      }
    }
    drawPalm(c, w * 0.12, h * 0.96, h * 0.42, 1);
    drawPalm(c, w * 0.86, h * 0.96, h * 0.46, -1);
    drawPalm(c, w * 0.04, h * 0.96, h * 0.32, 1);
  }

  /* === SAKURA === pink cottagecore sky + dark cherry-tree silhouette */
  function paintSakura(c, w, h) {
    const g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0,    '#a06088');
    g.addColorStop(0.32, '#d889a7');
    g.addColorStop(0.55, '#f5b8c5');
    g.addColorStop(0.80, '#f9dae0');
    g.addColorStop(1,    '#f1c0c8');
    c.fillStyle = g; c.fillRect(0, 0, w, h);

    // Soft sun blush
    const sx = w * 0.30, sy = h * 0.38;
    const blush = c.createRadialGradient(sx, sy, 0, sx, sy, w * 0.55);
    blush.addColorStop(0,   'rgba(255, 240, 245, 0.55)');
    blush.addColorStop(0.4, 'rgba(255, 215, 225, 0.25)');
    blush.addColorStop(1,   'rgba(255, 210, 220, 0)');
    c.fillStyle = blush; c.fillRect(0, 0, w, h);

    // Distant pink mountain
    c.fillStyle = 'rgba(110, 60, 90, 0.55)';
    c.beginPath();
    c.moveTo(0, h * 0.72);
    c.lineTo(w * 0.25, h * 0.55);
    c.lineTo(w * 0.45, h * 0.68);
    c.lineTo(w * 0.62, h * 0.50);
    c.lineTo(w * 0.85, h * 0.66);
    c.lineTo(w, h * 0.60);
    c.lineTo(w, h);
    c.lineTo(0, h);
    c.closePath();
    c.fill();

    // Foreground cherry tree
    c.fillStyle = '#180812';
    // trunk
    c.beginPath();
    c.moveTo(w * 0.18, h);
    c.bezierCurveTo(w * 0.20, h * 0.85, w * 0.22, h * 0.7, w * 0.28, h * 0.62);
    c.lineTo(w * 0.31, h * 0.62);
    c.bezierCurveTo(w * 0.25, h * 0.72, w * 0.24, h * 0.86, w * 0.23, h);
    c.closePath();
    c.fill();
    // upper branches — fine strokes
    c.strokeStyle = '#180812';
    c.lineWidth = 3;
    function branch(x, y, ang, len, depth) {
      if (depth <= 0 || len < 6) return;
      const x2 = x + Math.cos(ang) * len;
      const y2 = y + Math.sin(ang) * len;
      c.lineWidth = Math.max(1, depth * 0.9);
      c.beginPath();
      c.moveTo(x, y); c.lineTo(x2, y2);
      c.stroke();
      branch(x2, y2, ang - 0.4, len * 0.65, depth - 1);
      branch(x2, y2, ang + 0.4, len * 0.65, depth - 1);
    }
    branch(w * 0.295, h * 0.62, -Math.PI/2 + 0.2, h * 0.18, 5);
    branch(w * 0.295, h * 0.62, -Math.PI/2 - 0.4, h * 0.14, 5);

    // Pink blossom clusters on the branches
    c.fillStyle = '#ffb8d0';
    for (let i = 0; i < 18; i++) {
      const x = w * 0.16 + Math.random() * w * 0.32;
      const y = h * 0.18 + Math.random() * h * 0.38;
      const r = 12 + Math.random() * 18;
      const grad = c.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0,   'rgba(255, 200, 215, 0.75)');
      grad.addColorStop(0.5, 'rgba(255, 165, 195, 0.45)');
      grad.addColorStop(1,   'rgba(255, 165, 195, 0)');
      c.fillStyle = grad;
      c.fillRect(x - r, y - r, r * 2, r * 2);
    }

    // Subtle warm vignette bottom
    const vig = c.createLinearGradient(0, h * 0.85, 0, h);
    vig.addColorStop(0, 'rgba(80, 30, 50, 0)');
    vig.addColorStop(1, 'rgba(80, 30, 50, 0.35)');
    c.fillStyle = vig; c.fillRect(0, 0, w, h);
  }

  /* ============ THEME PARTICLES (rain streaks / snow / warm dust) ============ */
  function spawnDust() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.18,
      vy: -0.05 - Math.random() * 0.18,
      r: 0.6 + Math.random() * 1.4,
      a: 0.2 + Math.random() * 0.35,
    };
  }
  function spawnRain() {
    return {
      x: Math.random() * W,
      y: Math.random() * H - H * 0.5,
      v: 6 + Math.random() * 8,
      len: 12 + Math.random() * 14,
      a: 0.3 + Math.random() * 0.45,
    };
  }
  function spawnSnow() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vy: 0.25 + Math.random() * 0.6,
      drift: 0.3 + Math.random() * 0.6,
      phase: Math.random() * Math.PI * 2,
      r: 1.2 + Math.random() * 2.4,
      a: 0.55 + Math.random() * 0.4,
    };
  }

  function stepVanityParticles(dt) {
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
    });
  }
  function stepRainParticles(dt) {
    particles.forEach(p => {
      p.y += p.v;
      if (p.y > H + 20) { p.y = -20; p.x = Math.random() * W; }
    });
  }
  function stepWinterParticles(dt) {
    particles.forEach(p => {
      p.phase += 0.02;
      p.x += Math.sin(p.phase) * p.drift * 0.18;
      p.y += p.vy;
      if (p.y > H + 5) { p.y = -5; p.x = Math.random() * W; }
    });
  }

  function drawVanityParticles(c) {
    c.save();
    c.globalCompositeOperation = 'lighter';
    particles.forEach(p => {
      c.fillStyle = `rgba(255, 220, 180, ${p.a})`;
      c.beginPath(); c.arc(p.x, p.y, p.r, 0, Math.PI * 2); c.fill();
    });
    c.restore();
  }
  function drawRainParticles(c) {
    c.save();
    c.strokeStyle = 'rgba(170, 200, 240, 0.5)';
    c.lineWidth = 1;
    particles.forEach(p => {
      c.globalAlpha = p.a;
      c.beginPath(); c.moveTo(p.x, p.y); c.lineTo(p.x - 2, p.y + p.len); c.stroke();
    });
    c.restore();
  }
  function drawWinterParticles(c) {
    c.save();
    particles.forEach(p => {
      c.fillStyle = `rgba(255, 255, 255, ${p.a})`;
      c.beginPath(); c.arc(p.x, p.y, p.r, 0, Math.PI * 2); c.fill();
    });
    c.restore();
  }

  /* === Aquarium bubbles === */
  function spawnBubble() {
    return {
      x: Math.random() * W,
      y: H + Math.random() * H * 0.4,
      vy: -(0.4 + Math.random() * 0.9),
      drift: 0.3 + Math.random() * 0.5,
      phase: Math.random() * Math.PI * 2,
      r: 1.5 + Math.random() * 3.5,
      a: 0.35 + Math.random() * 0.45,

  }
  function stepBubbles(dt) {

  /* === Sakura petals === */
  function spawnPetal() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vy: 0.4 + Math.random() * 0.6,
      drift: 0.5 + Math.random() * 0.8,
      phase: Math.random() * Math.PI * 2,

  function stepPetals(dt) {
    particles.forEach(p => {
      p.phase += 0.022;
      p.x += Math.sin(p.phase) * p.drift * 0.35;
      p.y += p.vy;
      p.rot += p.vrot;
      if (p.y > H + 8) { p.y = -10; p.x = Math.random() * W; }

  function drawPetals(c) {

    particles.forEach(p => {
      c.save();
      c.translate(p.x, p.y);
      c.rotate(p.rot);
      c.fillStyle = `rgba(255, 190, 210, ${p.a})`;
      // simple petal: ellipse with notch
      c.beginPath();
      c.ellipse(0, 0, p.r, p.r * 0.6, 0, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = `rgba(255, 220, 230, ${p.a * 0.7})`;
      c.beginPath();
      c.ellipse(0, -p.r * 0.2, p.r * 0.5, p.r * 0.3, 0, 0, Math.PI * 2);
      c.fill();
      c.restore();
    });
    c.restore();
  }

  /* ============ FROST LAYER ============ */
  function fillFrost() {
    const [r, g, b] = theme.frostTint;
    const a = theme.frostAlpha;
    frostCtx.save();
    frostCtx.globalCompositeOperation = 'source-over';
    frostCtx.fillStyle = `rgba(${r}, ${g}, ${b}, ${a})`;
    frostCtx.fillRect(0, 0, W, H);

    // Noise / crystal texture
    if (themeName === 'winter') {
      paintIceCrystals(frostCtx);
    } else {
      paintFrostNoise(frostCtx);
    }
    frostCtx.restore();
  }

  function paintFrostNoise(c) {
    // Subtle dappled noise to make the frost look organic
    c.save();
    c.globalAlpha = 0.5;
    for (let i = 0; i < 1200; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const r = 0.6 + Math.random() * 1.6;
      const a = 0.05 + Math.random() * 0.18;
      c.fillStyle = `rgba(255, 255, 255, ${a})`;
      c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2); c.fill();
    }
    // A few darker droplet-base nodes
    for (let i = 0; i < 50; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const r = 4 + Math.random() * 12;
      c.globalAlpha = 0.06 + Math.random() * 0.06;
      const grad = c.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, 'rgba(255,255,255,0.7)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      c.fillStyle = grad;
      c.fillRect(x - r, y - r, r * 2, r * 2);
    }
    c.restore();
  }

  function paintIceCrystals(c) {
    // Fractal-ish snowflakes scattered + radial frost ferns
    c.save();
    for (let i = 0; i < 24; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const size = 30 + Math.random() * 70;
      drawIceFern(c, x, y, size, Math.random() * Math.PI);
    }
    // a few sparkles
    c.globalAlpha = 0.6;
    for (let i = 0; i < 300; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const a = 0.1 + Math.random() * 0.25;
      c.fillStyle = `rgba(255, 255, 255, ${a})`;
      c.fillRect(x, y, 1, 1);
    }
    c.restore();
  }

  function drawIceFern(c, x, y, size, rot) {
    c.save();
    c.translate(x, y);
    c.rotate(rot);
    c.strokeStyle = 'rgba(255, 255, 255, 0.42)';
    c.lineWidth = 0.7;
    for (let a = 0; a < 6; a++) {
      c.save();
      c.rotate((a * Math.PI * 2) / 6);
      c.beginPath();
      c.moveTo(0, 0);
      c.lineTo(0, -size);
      c.stroke();
      // Branches
      const branches = 4;
      for (let b = 1; b <= branches; b++) {
        const by = -(b / branches) * size;
        const bl = (1 - b / branches) * size * 0.45;
        c.beginPath();
        c.moveTo(0, by); c.lineTo(bl, by - bl * 0.6); c.stroke();
        c.beginPath();
        c.moveTo(0, by); c.lineTo(-bl, by - bl * 0.6); c.stroke();
      }
      c.restore();
    }
    c.restore();
  }

  /* ---------- wipe (destination-out with dynamic feathered brush) ---------- */
  let lastPt = null;
  let prevPt = null;
  let holdStart = 0;      // pointerdown timestamp for hold-to-fatten
  let holdAnchor = null;  // anchor position of hold (stays as long as finger doesn't move much)
  const MIN_R = 18, MAX_R = 64;

  function computeRadius(x, y, speedPxPerMs, pressure, nowMs) {
    // Speed factor: slow drag = wide brush, fast swipe = narrow.
    // < 0.2 px/ms → ~38, > 1.6 px/ms → 18
    const sf = Math.max(0, Math.min(1, (1.6 - speedPxPerMs) / 1.4));
    let r = 18 + sf * 22;     // 18..40

    // Pressure (Apple Pencil, future devices) — clamp pressure to (0.5..1.5)
    if (pressure > 0 && pressure !== 0.5) {
      r *= (0.75 + pressure * 0.5);
    }

    // Hold-to-fatten: anchor stays still → grow over up to 900ms to MAX_R
    if (holdAnchor) {
      const dxh = x - holdAnchor.x, dyh = y - holdAnchor.y;
      const drift = Math.hypot(dxh, dyh);
      if (drift < 14) {
        const heldMs = nowMs - holdStart;
        const t = Math.min(1, heldMs / 900);
        // Ease-out cubic
        const ease = 1 - Math.pow(1 - t, 3);
        const fat = 22 * ease;
        r += fat;
      } else {
        // moved → reset anchor at new spot (but keep recent start time so quick re-still still fattens fast)
        holdAnchor = { x, y };
        holdStart = nowMs - 200;
      }
    }

    return Math.max(MIN_R, Math.min(MAX_R, r));
  }

  function wipeAt(x, y, radius) {
    const c = frostCtx;
    c.save();
    c.globalCompositeOperation = 'destination-out';

    if (lastPt) {
      const dx = x - lastPt.x, dy = y - lastPt.y;
      const dist = Math.hypot(dx, dy);
      const steps = Math.max(1, Math.floor(dist / (radius * 0.42)));
      // Smoothly lerp the radius along the segment if it changes (gives a tapered brush feel)
      const r0 = (lastPt.r != null) ? lastPt.r : radius;
      for (let i = 1; i <= steps; i++) {
        const f = i / steps;
        const px = lastPt.x + dx * f;
        const py = lastPt.y + dy * f;
        const r  = r0 + (radius - r0) * f;
        const grad = c.createRadialGradient(px, py, 0, px, py, r);
        grad.addColorStop(0,    'rgba(0,0,0,1)');
        grad.addColorStop(0.55, 'rgba(0,0,0,0.85)');
        grad.addColorStop(1,    'rgba(0,0,0,0)');
        c.fillStyle = grad;
        c.beginPath(); c.arc(px, py, r, 0, Math.PI * 2); c.fill();
        lifetime += r * r * 0.0025;
      }
    } else {
      const grad = c.createRadialGradient(x, y, 0, x, y, radius);
      grad.addColorStop(0,    'rgba(0,0,0,1)');
      grad.addColorStop(0.55, 'rgba(0,0,0,0.85)');
      grad.addColorStop(1,    'rgba(0,0,0,0)');
      c.fillStyle = grad;
      c.beginPath(); c.arc(x, y, radius, 0, Math.PI * 2); c.fill();
      lifetime += radius * radius * 0.005;
    }
    c.restore();

    prevPt = lastPt;
    lastPt = { x, y, r: radius };
  }

  /* ---------- slow refrost ---------- */
  function regrowStep(dtMs) {
    if (isPoster) return;              // poster mode: never regrow
    regrowAcc += dtMs;
    if (regrowAcc < 260) return;       // ~4 ticks/sec, slow enough to keep drawings readable for 60-90s
    regrowAcc = 0;

    const [r, g, b] = theme.frostTint;
    const c = frostCtx;
    c.save();
    c.globalCompositeOperation = 'source-over';
    // 2 small dabs per tick — drawings stay readable for a long while
    for (let i = 0; i < 2; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const rad = 8 + Math.random() * 20;
      const grad = c.createRadialGradient(x, y, 0, x, y, rad);
      grad.addColorStop(0,    `rgba(${r}, ${g}, ${b}, 0.040)`);
      grad.addColorStop(0.6,  `rgba(${r}, ${g}, ${b}, 0.020)`);
      grad.addColorStop(1,    `rgba(${r}, ${g}, ${b}, 0)`);
      c.fillStyle = grad;
      c.fillRect(x - rad, y - rad, rad * 2, rad * 2);
    }
    c.restore();
  }

  /* ============ DRIPS (water beads running down wiped trails) ============ */
  function spawnDrip(x, y, vx) {
    drops.push({
      x: x + (Math.random() - 0.5) * 6,
      y,
      vx: vx * 0.08,
      vy: 0.1,
      life: 0,
      maxLife: 2200 + Math.random() * 1800,
      r: 2 + Math.random() * 2.5,
      color: theme.drip.color,
    });
    if (drops.length > 80) drops.shift();
  }
  function stepDrips(dtMs) {
    const dt = dtMs / 16;
    for (let i = drops.length - 1; i >= 0; i--) {
      const d = drops[i];
      d.life += dtMs;
      d.vy += 0.04 * dt;       // gravity
      d.vx *= 0.96;             // friction
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      // Each drop also nibbles the frost a bit as it falls
      const c = frostCtx;
      c.save();
      c.globalCompositeOperation = 'destination-out';
      const grad = c.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r * 1.8);
      grad.addColorStop(0, 'rgba(0,0,0,0.4)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      c.fillStyle = grad;
      c.beginPath(); c.arc(d.x, d.y, d.r * 1.8, 0, Math.PI * 2); c.fill();
      c.restore();
      if (d.life > d.maxLife || d.y > H + 20) drops.splice(i, 1);
    }
  }
  function drawDrips(c) {
    c.clearRect(0, 0, W, H);
    drops.forEach(d => {
      const grad = c.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r * 2.4);
      grad.addColorStop(0,    d.color);
      grad.addColorStop(0.7,  d.color.replace(/[\d.]+\)$/, '0.18)'));
      grad.addColorStop(1,    d.color.replace(/[\d.]+\)$/, '0)'));
      c.fillStyle = grad;
      c.beginPath(); c.arc(d.x, d.y, d.r * 2.4, 0, Math.PI * 2); c.fill();
      // bright reflection
      c.fillStyle = 'rgba(255, 255, 255, 0.55)';
      c.beginPath(); c.arc(d.x - d.r * 0.3, d.y - d.r * 0.4, d.r * 0.35, 0, Math.PI * 2); c.fill();
    });
  }

  /* ============ AUDIO (iOS-safe, breathing pad + throttled squeak) ============ */
  let actx = null, master = null, ambientStarted = false;
  let noiseBuf = null;
  let lastSqueak = 0;
  let voicesAlive = 0;

  function initAudio() {
    if (actx) return;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      actx = new Ctx();
      master = actx.createGain();
      master.gain.value = 0.5;
      master.connect(actx.destination);

      // pre-allocate pink-ish noise buffer (2s loop) — used by squeak + ambient
      const sec = 2;
      const len = actx.sampleRate * sec;
      noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
      const ch = noiseBuf.getChannelData(0);
      let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
      for (let i = 0; i < len; i++) {
        const white = Math.random() * 2 - 1;
        b0 = 0.99886 * b0 + white * 0.0555179;
        b1 = 0.99332 * b1 + white * 0.0750759;
        b2 = 0.96900 * b2 + white * 0.1538520;
        b3 = 0.86650 * b3 + white * 0.3104856;
        b4 = 0.55000 * b4 + white * 0.5329522;
        b5 = -0.7616 * b5 - white * 0.0168980;
        ch[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
        b6 = white * 0.115926;
      }
      // Ambient is delayed by 600ms to dodge iOS first-gesture stall
      setTimeout(() => { if (!ambientStarted && actx) { startAmbient(); ambientStarted = true; } }, 600);
    } catch (_) { actx = null; }
  }

  // Ambient: breathing drone per global rule (no continuous loop)
  let ambientNodes = null;
  function startAmbient() {
    if (!actx) return;
    // Build per current theme; tear down on theme switch.
    rebuildAmbient();
    scheduleAmbientBreath();
  }
  function rebuildAmbient() {
    if (!actx) return;
    if (ambientNodes) { try { ambientNodes.disconnect(); } catch(_){} ambientNodes = null; }
    const g = actx.createGain();
    g.gain.value = 0;
    g.connect(master);

    if (theme.ambient === 'rain') {
      const src = actx.createBufferSource();
      src.buffer = noiseBuf; src.loop = true;
      const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1400;
      const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 220;
      src.connect(hp); hp.connect(lp); lp.connect(g);
      src.start();
      ambientNodes = { g, src, _peak: 0.35 };
    } else if (theme.ambient === 'wind') {
      const src = actx.createBufferSource();
      src.buffer = noiseBuf; src.loop = true;
      const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 700;
      const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 80;
      src.connect(hp); hp.connect(lp); lp.connect(g);
      src.start();
      ambientNodes = { g, src, _peak: 0.22 };
    } else if (theme.ambient === 'underwater') {
      // muffled deep rumble + occasional plink-suggested noise
      const src = actx.createBufferSource();
      src.buffer = noiseBuf; src.loop = true;
      const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 360;
      const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 40;
      src.connect(hp); hp.connect(lp); lp.connect(g);
      // a deep bass sine doubling
      const bass = actx.createOscillator(); bass.type = 'sine'; bass.frequency.value = 65;
      const bg = actx.createGain(); bg.gain.value = 0.5;
      bass.connect(bg); bg.connect(g);
      src.start(); bass.start();
      ambientNodes = { g, src, bass, _peak: 0.28 };
    } else if (theme.ambient === 'pad-soft') {
      // higher, brighter pad — for sakura
      const o1 = actx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 165;
      const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 247.5;
      const o3 = actx.createOscillator(); o3.type = 'sine'; o3.frequency.value = 330.5;
      const mix = actx.createGain(); mix.gain.value = 0.32;
      o1.connect(mix); o2.connect(mix); o3.connect(mix);
      const filt = actx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 1100;
      mix.connect(filt); filt.connect(g);
      o1.start(); o2.start(); o3.start();
      ambientNodes = { g, o1, o2, o3, _peak: 0.16 };
    } else {
      // pad-warm: two detuned sines + tiny noise tail
      const o1 = actx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 110;
      const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 165;
      const o3 = actx.createOscillator(); o3.type = 'sine'; o3.frequency.value = 220.5;
      const mix = actx.createGain(); mix.gain.value = 0.4;
      o1.connect(mix); o2.connect(mix); o3.connect(mix);
      const filt = actx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 800;
      mix.connect(filt); filt.connect(g);
      o1.start(); o2.start(); o3.start();
      ambientNodes = { g, o1, o2, o3, _peak: 0.18 };
    }
  }

  // breathing: rise 5-8s → hold 8-16s → fall 6-10s → silence 7-16s → loop
  function scheduleAmbientBreath() {
    if (!actx || !ambientNodes) return;
    const t0 = actx.currentTime;
    const rise = 5 + Math.random() * 3;
    const hold = 8 + Math.random() * 8;
    const fall = 6 + Math.random() * 4;
    const silent = 7 + Math.random() * 9;
    const peak = ambientNodes._peak;
    const g = ambientNodes.g.gain;
    try {
      g.cancelScheduledValues(t0);
      g.setValueAtTime(g.value, t0);
      g.linearRampToValueAtTime(peak, t0 + rise);
      g.linearRampToValueAtTime(peak, t0 + rise + hold);
      g.linearRampToValueAtTime(0,    t0 + rise + hold + fall);
    } catch (_) {}
    setTimeout(scheduleAmbientBreath, (rise + hold + fall + silent) * 1000);
  }

  // Squeak SFX: short filtered noise burst, throttled, max 4 voices.
  // Wider brush → lower-pitched, longer, breathier squeak (like pressing harder).
  function playSqueak(speed, radius = 26) {
    if (!actx || actx.state !== 'running') return;
    const now = performance.now();
    if (now - lastSqueak < 110) return;
    if (voicesAlive >= 4) return;
    lastSqueak = now;
    voicesAlive++;
    try {
      const src = actx.createBufferSource(); src.buffer = noiseBuf; src.loop = false;
      const bp = actx.createBiquadFilter(); bp.type = 'bandpass';
      // Wider brush → lower band-pass center (deeper squeak)
      const radFactor = Math.max(0, Math.min(1, (radius - 18) / 46));   // 0..1
      const baseFreq = 2400 - radFactor * 1300;                          // narrow→2400, wide→1100
      bp.frequency.value = baseFreq + Math.min(2400, speed * 30);
      bp.Q.value = 5 - radFactor * 1.5;
      const g = actx.createGain(); g.gain.value = 0;
      const t = actx.currentTime;
      const amp = Math.min(0.24, 0.05 + speed * 0.003 + radFactor * 0.05);
      const len = 0.18 + radFactor * 0.16;                               // wider = longer tail
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(amp, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t + len);
      src.connect(bp); bp.connect(g); g.connect(master);
      src.start(t, Math.random() * 1.5);
      src.stop(t + len + 0.04);
      src.onended = () => { voicesAlive = Math.max(0, voicesAlive - 1); };
    } catch (_) { voicesAlive = Math.max(0, voicesAlive - 1); }
  }

  // Drip plink (lower, infrequent)
  let lastPlink = 0;
  function playPlink() {
    if (!actx || actx.state !== 'running') return;
    const now = performance.now();
    if (now - lastPlink < 800) return;
    lastPlink = now;
    try {
      const o = actx.createOscillator(); o.type = 'sine';
      const base = (themeName === 'winter') ? 880 : (themeName === 'rain' ? 520 : 660);
      o.frequency.value = base * (0.95 + Math.random() * 0.12);
      const g = actx.createGain();
      const t = actx.currentTime;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.13, t + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t + 0.6);
    } catch (_) {}
  }

  /* ============ POINTER ============ */
  let pointerActive = false;
  let lastMoveTime = 0;
  let lastMovePos = null;

  function onDown(e) {
    e.preventDefault();
    pointerActive = true;
    lastPt = null; prevPt = null;
    if (!firstTouch) {
      firstTouch = true;
      countEl.classList.remove('hint');
      countEl.style.display = '';
      countEl.textContent = formatScore(lifetime);
      // fade out the centered wipe hint + remember they've seen it
      if (wipeHintEl) wipeHintEl.classList.add('gone');
      markIntroSeen();
    }
    initAudio();
    if (actx && actx.state !== 'running') {
      try { actx.resume(); } catch (_) {}
    }
    const r = frost.getBoundingClientRect();
    const x = (e.clientX - r.left);
    const y = (e.clientY - r.top);
    const now = performance.now();
    holdStart = now; holdAnchor = { x, y };
    const radius = computeRadius(x, y, 0.4, e.pressure || 0, now);
    wipeAt(x, y, radius);
    bumpCount();
    spawnDrip(x, y, 0);
    lastMoveTime = now;
    lastMovePos = { x, y };
  }

  function onMove(e) {
    if (!pointerActive) return;
    e.preventDefault();
    const r = frost.getBoundingClientRect();
    const x = (e.clientX - r.left);
    const y = (e.clientY - r.top);
    const now = performance.now();
    if (now - lastMoveTime < 14) return;     // throttle to ~66fps max
    let speed = 0;
    if (lastMovePos) {
      const dx = x - lastMovePos.x, dy = y - lastMovePos.y;
      speed = Math.hypot(dx, dy) / Math.max(1, (now - lastMoveTime));
    }
    const radius = computeRadius(x, y, speed, e.pressure || 0, now);
    lastMovePos = { x, y };
    lastMoveTime = now;
    wipeAt(x, y, radius);
    playSqueak(speed, radius);
    // Wider brush → more drips
    if (Math.random() < 0.04 + radius * 0.001) spawnDrip(x, y, prevPt ? (x - prevPt.x) : 0);
    bumpCount();
  }

  function onUp() {
    pointerActive = false;
    lastPt = null; prevPt = null;
    holdAnchor = null;
    flushScore();
  }

  function bumpCount() {
    pendingScore++;
    if (firstTouch) {
      countEl.textContent = formatScore(lifetime);
      countEl.classList.add('pop');
      setTimeout(() => countEl.classList.remove('pop'), 160);
    }
  }

  function formatScore(n) {
    return Math.floor(n).toLocaleString('en-US');
  }

  /* ---------- persistence + remote submit ---------- */
  const STORAGE_KEY = 'frosted_window_lifetime_v1';
  function loadLifetime() {
    try {
      const v = parseFloat(localStorage.getItem(STORAGE_KEY) || '0');
      if (Number.isFinite(v) && v > 0) lifetime = v;
    } catch (_) {}
  }
  function saveLifetime() {
    try { localStorage.setItem(STORAGE_KEY, String(Math.floor(lifetime))); } catch (_) {}
  }
  let saveAcc = 0;
  function maybeSave(dtMs) {
    saveAcc += dtMs;
    if (saveAcc > 1500 && pendingScore > 0) {
      saveAcc = 0;
      saveLifetime();
      if (pendingScore >= 8) {
        pendingScore = 0;
        if (window.GG_LB && window.GG_LB.submitScore) {
          window.GG_LB.submitScore(Math.floor(lifetime));
        }
      }
    }
  }
  function flushScore() {
    // Only persist if there is unsaved progress; this avoids re-writing
    // a cleared localStorage from in-memory state on page unload.
    if (pendingScore <= 0) return;
    saveLifetime();
    if (window.GG_LB && window.GG_LB.submitScore) {
      window.GG_LB.submitScore(Math.floor(lifetime));
    }
    pendingScore = 0;
  }
  document.addEventListener('visibilitychange', () => { if (document.hidden) flushScore(); });
  window.addEventListener('pagehide', flushScore);

  /* ============ MAIN LOOP ============ */
  let lastT = 0;
  let raf = 0;
  const FRAME_MS = 1000 / 60;
  function frame(t) {
    if (!lastT) lastT = t;
    const dt = Math.min(64, t - lastT);
    if (dt < FRAME_MS - 1) { raf = requestAnimationFrame(frame); return; }
    lastT = t;

    // bg + particles
    bgCtx.clearRect(0, 0, W, H);
    if (cachedBg) bgCtx.drawImage(cachedBg, 0, 0, W, H);
    theme.stepParticles(dt);
    theme.drawParticles(bgCtx);

    // drip nibbles frost, then renders
    stepDrips(dt);
    drawDrips(dripCtx);

    regrowStep(dt);
    maybeSave(dt);

    raf = requestAnimationFrame(frame);
  }

  /* ============ THEME SWITCH ============ */
  let cachedBg = null;
  function applyTheme(name) {
    if (!THEMES[name]) return;
    themeName = name;
    theme = THEMES[name];
    document.body.style.background = theme.bodyBg;
    // re-cache bg
    cachedBg = document.createElement('canvas');
    cachedBg.width = W; cachedBg.height = H;
    theme.paintBg(cachedBg.getContext('2d'), W, H);
    // reset particles
    theme.initParticles();
    drops = [];
    // refrost
    fillFrost();
    // update theme chips
    themeStrip.querySelectorAll('.theme-chip').forEach(d => {
      d.classList.toggle('active', d.dataset.t === name);
    });
    // restart ambient
    if (ambientStarted) {
      rebuildAmbient();
      scheduleAmbientBreath();
    }
    try { localStorage.setItem('frosted_window_theme', name); } catch (_) {}
  }

  themeStrip.addEventListener('pointerdown', e => {
    const chip = e.target.closest('.theme-chip');
    if (!chip) return;
    const t = chip.dataset.t;
    if (t && t !== themeName) {
      initAudio();
      if (actx && actx.state !== 'running') { try { actx.resume(); } catch (_) {} }
      applyTheme(t);
      // scroll into view
      chip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  });

  /* ============ RESIZE ============ */
  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = w; H = h;
    [bg, drip, frost].forEach(cv => {
      cv.style.width = w + 'px';
      cv.style.height = h + 'px';
      cv.width = Math.floor(w * DPR);
      cv.height = Math.floor(h * DPR);
      const c = cv.getContext('2d');
      c.setTransform(DPR, 0, 0, DPR, 0, 0);
    });
    // re-cache bg
    cachedBg = document.createElement('canvas');
    cachedBg.width = W; cachedBg.height = H;
    theme.paintBg(cachedBg.getContext('2d'), W, H);
    theme.initParticles();
    fillFrost();
  }
  window.addEventListener('resize', resize);

  /* ============ INIT ============ */
  loadLifetime();
  resize();
  const urlTheme = new URLSearchParams(window.location.search).get('theme');
  let saved = null;
  try { saved = localStorage.getItem('frosted_window_theme'); } catch (_) {}
  const startTheme = (urlTheme && THEMES[urlTheme]) ? urlTheme
                    : (saved && THEMES[saved]) ? saved
                    : 'rain';
  applyTheme(startTheme);

  const forceIntro = new URLSearchParams(window.location.search).get('intro') === '1';
  // Bump this whenever the intro UX changes; players who haven't seen
  // the current version will be re-greeted with the demo on next visit.
  const INTRO_VERSION = 'v2';
  const INTRO_KEY = 'frosted_window_intro_seen';
  let introSeen = '';
  try { introSeen = localStorage.getItem(INTRO_KEY) || ''; } catch (_) {}
  const needsIntro = forceIntro || introSeen !== INTRO_VERSION;

  if (lifetime > 0 && !needsIntro) {
    countEl.classList.remove('hint');
    countEl.style.display = '';
    countEl.textContent = formatScore(lifetime);
    firstTouch = true;
    // Returning player who has seen the current intro — skip it
    if (wipeHintEl) wipeHintEl.style.display = 'none';
  } else if (!isPoster) {
    // First-time visitor OR returning player who hasn't seen the new intro
    if (lifetime > 0) {
      // Pre-show their lifetime in the bottom HUD; the centered demo still plays
      countEl.classList.remove('hint');
      countEl.style.display = '';
      countEl.textContent = formatScore(lifetime);
    }
    if (forceIntro) firstTouch = false;
    runIntroDemo();
  }

  function markIntroSeen() {
    try { localStorage.setItem(INTRO_KEY, INTRO_VERSION); } catch (_) {}
  }

  function runIntroDemo() {
    if (firstTouch) return;
    const ghost = document.getElementById('ghostFinger');
    const label = document.getElementById('wipeHintLabel');
    if (!ghost) return;
    const cx = W * 0.5, cy = H * 0.50;
    const startX = cx - Math.min(110, W * 0.25);
    const endX   = cx + Math.min(110, W * 0.25);
    // Fingertip sits at SVG (50%, 28%) ≈ (19, 14.6) of a 38x52 ghost
    const TX_OFF = 19, TY_OFF = 14.6;
    function placeGhost(x, y, rot = 0) {
      ghost.style.transform = `translate(${x - TX_OFF}px, ${y - TY_OFF}px) rotate(${rot}deg)`;
    }
    placeGhost(startX, cy, -8);
    requestAnimationFrame(() => ghost.classList.add('show'));

    // Pause briefly to let user see the hand appear before it moves
    setTimeout(() => {
      if (firstTouch) return;
      const duration = 1800;
      const T0 = performance.now();
      let lastWipeT = 0;
      lastPt = null;
      const tick = (now) => {
        if (firstTouch) return;
        const elapsed = now - T0;
        const f = Math.min(1, elapsed / duration);
        // ease-in-out cubic
        const ease = f < 0.5 ? 4*f*f*f : 1 - Math.pow(-2*f + 2, 3) / 2;
        const x = startX + (endX - startX) * ease;
        const tilt = -8 + 16 * ease;     // -8° → +8°
        placeGhost(x, cy, tilt);
        if (now - lastWipeT > 40) {
          lastWipeT = now;
          wipeAt(x, cy, 32);
        }
        if (f < 1) {
          requestAnimationFrame(tick);
        } else {
          // Stroke done — show label and KEEP ghost visible until first touch.
          // Important for preload: even if the game runs the demo while the
          // user is still on the previous game, the ghost + label remain in
          // place when they finally land here. They fade on first pointerdown.
          label.classList.add('show');
          ghost.classList.add('idle');
        }
      };
      requestAnimationFrame(tick);
    }, 450);
  }

  // Poster mode — hide bottom HUD + show top title + wipe a big swirl (synchronous)
  function doPosterWipe() {
    const cx = W * 0.5, cy = H * 0.62;
    const r0 = Math.min(W, H) * 0.22;
    lastPt = null;
    const N = 220;
    for (let i = 0; i <= N; i++) {
      const t = (i / N) * Math.PI * 6;
      const rad = r0 * (0.22 + 0.78 * (i / N));
      wipeAt(cx + Math.cos(t) * rad, cy + Math.sin(t) * rad, 44);
    }
    lastPt = null;
    const sweepY = H * 0.42;
    const sweepW = W * 0.65;
    for (let i = 0; i <= 36; i++) {
      const fx = W * 0.5 - sweepW * 0.5 + (sweepW * i / 36);
      wipeAt(fx, sweepY + Math.sin(i * 0.4) * 8, 40);
    }
    lastPt = null;
  }
  if (isPoster) {
    document.querySelector('.hud-bottom').style.display = 'none';
    document.querySelector('.theme-strip').style.display = 'none';
    document.querySelector('.watermark').style.display = 'none';
    if (wipeHintEl) wipeHintEl.style.display = 'none';
    document.getElementById('posterOverlay').style.display = 'block';
    doPosterWipe();           // synchronous — fires after applyTheme/fillFrost
  }

  // Demo / poster helpers — pre-wipe a heart-shaped reveal
  const demo = new URLSearchParams(window.location.search).get('demo');
  if (demo === 'heart') {
    setTimeout(() => {
      const cx = W * 0.5, cy = H * 0.46, scale = Math.min(W, H) * 0.22;
      const N = 110;
      lastPt = null;
      for (let i = 0; i <= N; i++) {
        const t = (i / N) * Math.PI * 2;
        const hx = 16 * Math.pow(Math.sin(t), 3);
        const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
        wipeAt(cx + hx * scale / 16, cy + hy * scale / 16, 30);
      }
      lastPt = null;
    }, 100);
  } else if (demo === 'circle') {
    setTimeout(() => {
      const cx = W * 0.5, cy = H * 0.46, rad = Math.min(W, H) * 0.28;
      lastPt = null;
      const N = 80;
      for (let i = 0; i <= N; i++) {
        const t = (i / N) * Math.PI * 2;
        wipeAt(cx + Math.cos(t) * rad, cy + Math.sin(t) * rad, 30);
      }
      for (let r = rad; r > 0; r -= 18) {
        for (let i = 0; i < 20; i++) {
          const t = (i / 20) * Math.PI * 2;
          wipeAt(cx + Math.cos(t) * r, cy + Math.sin(t) * r, 30);
        }
      }
      lastPt = null;
    }, 100);
  }

  // Pointer events on the frost canvas
  frost.addEventListener('pointerdown', onDown);
  frost.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup',   onUp);
  window.addEventListener('pointercancel', onUp);

  // Plink trigger after intentional clears
  let plinkAcc = 0;
  setInterval(() => {
    // Probability check that scales with drop count — wet windows plink more
    if (drops.length > 6 && Math.random() < 0.18) playPlink();
  }, 850);

  raf = requestAnimationFrame(frame);
})();
